name: Android Build Release

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      run: |
        # Keystore ని నేరుగా app/ ఫోల్డర్ లోకి డికోడ్ చేస్తున్నాము
        echo "${{ secrets.KEYSTORE }}" | base64 --decode > app/release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release AAB
      run: ./gradlew bundleRelease
      env:
        # ఇక్కడ పాత్ సరిగ్గా ఇవ్వాలి
        RELEASE_STORE_FILE: release.jks 
        RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: signed-release-aab
        path: app/build/outputs/bundle/release/*.aab
